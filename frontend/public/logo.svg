<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- rounded gradient tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g1)"/>
  <!-- subtle ring -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <!-- ground line -->
  <path d="M6 50 L58 50" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-dasharray="2 3"/>
  <!-- land parcels (3 sized blocks) -->
  <path d="M10 50 L10 38 L24 38 L24 50 Z" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.4"/>
  <path d="M26 50 L26 30 L42 30 L42 50 Z" fill="rgba(255,255,255,0.28)" stroke="white" stroke-width="1.4"/>
  <path d="M44 50 L44 34 L54 34 L54 50 Z" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.4"/>
  <!-- pin -->
  <circle cx="34" cy="20" r="6.5" fill="url(#g2)"/>
  <circle cx="34" cy="20" r="2.5" fill="#1d4ed8"/>
  <path d="M34 26.5 L34 30" stroke="url(#g2)" stroke-width="2" stroke-linecap="round"/>
</svg>
