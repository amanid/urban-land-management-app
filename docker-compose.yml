services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urban_land
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports: ["5440:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6390:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
      - media:/app/media
    ports: ["8010:8000"]
    command: >
      sh -c "python manage.py makemigrations accounts lots clients transactions reports notifications dashboard audit common --noinput &&
             python manage.py migrate --noinput &&
             python manage.py seed_roles &&
             python manage.py seed_demo_users &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 60"

  celery:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      backend: { condition: service_started }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    command: celery -A core worker --loglevel=info

  celery-beat:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      backend: { condition: service_started }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_PROXY: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  pgdata:
  media:
