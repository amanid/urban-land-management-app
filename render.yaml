# Infrastructure-as-code pour Render (https://render.com)
# Push vers GitHub puis "New Blueprint" sur Render -> selectionnez ce fichier.

databases:
  - name: urban-land-db
    databaseName: urban_land
    user: urban_land
    plan: free                 # passer en starter/standard pour la prod
    region: frankfurt          # ou oregon, singapore...

services:
  # -------------------------------------------------------------------
  # Redis (cache + broker Celery)
  # -------------------------------------------------------------------
  - type: redis
    name: urban-land-redis
    plan: free
    region: frankfurt
    ipAllowList: []            # interne uniquement
    maxmemoryPolicy: allkeys-lru

  # -------------------------------------------------------------------
  # API Django (Gunicorn)
  # -------------------------------------------------------------------
  - type: web
    name: urban-land-api
    runtime: python
    plan: starter              # free = 512MB RAM, starter = 512MB+
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --threads 2 --timeout 60 --access-logfile -
    healthCheckPath: /api/v1/dashboard/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true     # genere automatiquement par Render
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: urban-land-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: urban-land-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false             # a renseigner avec l'URL du frontend une fois deploye
      - key: DEFAULT_CURRENCY
        value: XOF
      - key: DEFAULT_LANGUAGE
        value: fr
      - key: TIME_ZONE
        value: Africa/Abidjan
      - key: COMPANY_NAME
        sync: false             # personnalisable par client
      - key: COMPANY_ADDRESS
        sync: false
      - key: COMPANY_PHONE
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: COMPANY_RCCM
        sync: false
      - key: DEMO_USERS_ENABLED
        value: "True"
      - key: DEMO_USERS_PASSWORD
        generateValue: true

  # -------------------------------------------------------------------
  # Worker Celery (taches asynchrones)
  # -------------------------------------------------------------------
  - type: worker
    name: urban-land-worker
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        fromService:
          type: web
          name: urban-land-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: urban-land-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: urban-land-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

  # -------------------------------------------------------------------
  # Celery Beat (planificateur de rappels d'echeances)
  # -------------------------------------------------------------------
  - type: worker
    name: urban-land-beat
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        fromService:
          type: web
          name: urban-land-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: urban-land-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: urban-land-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

  # -------------------------------------------------------------------
  # Frontend statique (build Vite)
  # -------------------------------------------------------------------
  - type: web
    name: urban-land-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://urban-land-api.onrender.com/api/:splat
      - type: rewrite
        source: /media/*
        destination: https://urban-land-api.onrender.com/media/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://urban-land-api.onrender.com
