# Render Blueprint — DEPLOIEMENT TOUT-EN-UN, 100% AGNOSTIQUE.
#
# UN SEUL service Render heberge l'application complete :
#   - API Django + Gunicorn
#   - Frontend React build et servi par Django (multi-stage Docker)
#   - SQLite par defaut (zero config)
#
# Services optionnels (decommentez si vous voulez les ajouter) :
#   - PostgreSQL : decommentez la section "databases" en bas + DATABASE_URL
#   - Redis      : decommentez le service redis + REDIS_URL
#
# Push -> Render rebuild -> service en ligne. Zero action manuelle.

services:
  - type: web
    name: urban-land
    runtime: docker
    plan: free                     # passer en starter pour la prod ($7/mois)
    region: frankfurt              # ou oregon, singapore, ohio...
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/dashboard/health/
    autoDeploy: true

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DEFAULT_CURRENCY
        value: XOF
      - key: DEFAULT_LANGUAGE
        value: fr
      - key: TIME_ZONE
        value: Africa/Abidjan
      - key: DEMO_USERS_ENABLED
        value: "True"
      - key: DEMO_USERS_PASSWORD
        generateValue: true
      - key: SERVE_FRONTEND
        value: "1"
      - key: COMPANY_NAME
        value: "Ma Societe Immobiliere SARL"
      - key: COMPANY_ADDRESS
        value: "Abidjan, Cote d'Ivoire"
      - key: COMPANY_PHONE
        value: "+225 27 00 00 00 00"
      - key: COMPANY_EMAIL
        value: "contact@example.ci"
      - key: COMPANY_RCCM
        value: "CI-ABJ-2026-B-00000"

      # --- DATABASE_URL et REDIS_URL : decommentez les services correspondants
      # --- en bas pour les activer automatiquement. Sinon SQLite + cache local.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: urban-land-db
      #     property: connectionString
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: urban-land-redis
      #     property: connectionString

